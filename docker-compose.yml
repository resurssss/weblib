services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: electolibrary-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
      - ./backend/uploads:/app/uploads
    environment:
      - DATABASE_URL=sqlite:////data/tasks.db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: electolibrary-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend